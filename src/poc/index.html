<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0A3DFF">
    <title>JOVI Flow – 3 Toques</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="css/jovi.css?v=6" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Screen 1: Splash -->
        <section id="screen-splash" class="screen screen-splash active">
            <div class="splash-content">
                <div class="logo-container">
                    <div class="logo-icon"></div>
                    <h1 class="brand">JOVI</h1>
                    <p class="tagline">Flow</p>
                </div>
                <div class="loading-indicator">
                    <div class="spinner"></div>
                </div>
                <p class="splash-hint">Toque para começar</p>
            </div>
        </section>

        <!-- Screen 2: Camera -->
        <section id="screen-camera" class="screen screen-camera">
            <div class="camera-viewfinder">
                <video id="camera-preview" autoplay playsinline muted></video>
                <canvas id="camera-canvas" class="d-none"></canvas>
                <div id="camera-overlay" class="camera-overlay">
                    <div class="aura-light-effect"></div>
                </div>
            </div>
            <div class="camera-controls">
                <div class="top-bar">
                    <button id="btn-flash" class="btn-icon" aria-label="Alternar Flash">
                        <span class="icon-flash">⚡</span>
                    </button>
                    <div class="d-flex align-items-center gap-2">
                        <span class="fps-counter" id="fps-counter">-- FPS</span>
                        <div id="performance-spark" class="performance-spark ready" aria-label="Indicador IA Inteligente" title="IA Status"></div>
                    </div>
                    <button id="btn-settings" class="btn-icon" aria-label="Configurações">
                        <span class="icon-settings">⚙️</span>
                    </button>
                </div>
                <div class="bottom-bar">
                    <button id="btn-gallery-thumb" class="btn-gallery-thumb" aria-label="Ver galeria">
                        <div class="thumbnail-placeholder"></div>
                    </button>
                    <div class="capture-area">
                        <button id="btn-capture" class="btn-capture" aria-label="Capturar foto e ajustar iluminação">
                            <span class="capture-ring"></span>
                            <span class="capture-button"></span>
                        </button>
                    </div>
                    <button id="btn-switch-camera" class="btn-icon btn-switch" aria-label="Trocar câmera">
                        <span class="icon-switch">🔄</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- Screen 3: Gallery -->
        <section id="screen-gallery" class="screen screen-gallery">
            <header class="gallery-header">
                <button id="btn-back-camera" class="btn-icon" aria-label="Voltar para a câmera">
                    <span class="icon-back">◀</span>
                </button>
                <h2>Galeria Bento</h2>
                <button id="btn-select" class="btn-text" aria-label="Selecionar fotos">Selecionar</button>
            </header>
            <div id="gallery-grid" class="gallery-grid">
                <div class="gallery-empty" id="gallery-empty">
                    <span class="icon-empty">📷</span>
                    <p>Nenhuma foto ainda</p>
                    <button id="btn-goto-camera" class="btn btn-primary">Tirar primeira foto</button>
                </div>
            </div>
            <footer class="gallery-footer" id="gallery-footer">
                <button id="btn-share" class="btn btn-primary btn-share" disabled aria-label="Compartilhar selecionadas">
                    Compartilhar
                </button>
            </footer>
        </section>

        <!-- Screen 4: Detail -->
        <section id="screen-detail" class="screen screen-detail">
            <header class="detail-header">
                <button id="btn-back-gallery" class="btn-icon" aria-label="Voltar para galeria">
                    <span class="icon-back">◀</span>
                </button>
                <span id="detail-date" class="detail-date"></span>
                <button id="btn-delete" class="btn-icon btn-delete" aria-label="Excluir foto">
                    <span class="icon-delete">🗑️</span>
                </button>
            </header>
            <div class="detail-view">
                <img id="detail-image" src="data:," alt="Foto detalhada">
            </div>
            <div class="detail-actions">
                <button id="btn-add-tag" class="btn btn-outline" aria-label="Adicionar tag">
                    <span class="icon-tag">🏷️</span> Adicionar Tag
                </button>
                <button id="btn-share-photo" class="btn btn-primary" aria-label="Compartilhar esta foto">
                    Compartilhar
                </button>
            </div>
        </section>

        <!-- Screen 5: Share -->
        <section id="screen-share" class="screen screen-share">
            <header class="share-header">
                <button id="btn-back-detail" class="btn-icon" aria-label="Voltar para detalhe">
                    <span class="icon-back">◀</span>
                </button>
                <h2>Compartilhar</h2>
            </header>
            <div class="share-preview">
                <img id="share-preview-image" src="data:," alt="Compartilhar visualização">
            </div>
            <div class="share-options">
                <button class="btn-share-option" data-platform="whatsapp" aria-label="Compartilhar no WhatsApp">
                    <span class="icon-whatsapp">💬</span>
                    <span>WhatsApp</span>
                </button>
                <button class="btn-share-option" data-platform="instagram" aria-label="Compartilhar no Instagram">
                    <span class="icon-instagram">📸</span>
                    <span>Instagram</span>
                </button>
                <button class="btn-share-option" data-platform="copy" aria-label="Copiar link da foto">
                    <span class="icon-copy">📋</span>
                    <span>Copiar</span>
                </button>
            </div>
            <div class="share-status" id="share-status"></div>
        </section>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js?v=6" type="module"></script>
</body>
</html>
